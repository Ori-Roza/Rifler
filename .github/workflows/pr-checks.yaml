name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - master
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint

  test:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm test

  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile

  e2e-test:
    name: E2E (${{ matrix.distribution }}, ${{ matrix.os }}, ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x]
        distribution: [vscode, cursor, antigravity]

    env:
      CURSOR_LINUX_URL: https://api2.cursor.sh/updates/download/golden/linux-x64-deb/cursor/2.5
      CURSOR_WINDOWS_URL: https://api2.cursor.sh/updates/download/golden/win32-x64-user/cursor/2.5
      ANTIGRAVITY_WINDOWS_URL: https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.18.4-5780041996042240/windows-x64/Antigravity.exe
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile TypeScript
        run: npm run compile
      
      - name: Copy webview assets
        run: npm run copy-webview

      - name: Resolve E2E distribution (Linux)
        if: runner.os == 'Linux' && matrix.distribution != 'vscode'
        run: |
          DOWNLOAD_URL=""
          EXEC_PATH=""
          case "${{ matrix.distribution }}" in
            cursor)
              DOWNLOAD_URL="${{ env.CURSOR_LINUX_URL }}"
              EXEC_PATH="$GITHUB_WORKSPACE/e2e-app/usr/share/cursor/cursor"
              ;;
            antigravity)
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://us-central1-apt.pkg.dev/doc/repo-signing-key.gpg | sudo gpg --dearmor --yes -o /etc/apt/keyrings/antigravity-repo-key.gpg
              echo "deb [signed-by=/etc/apt/keyrings/antigravity-repo-key.gpg] https://us-central1-apt.pkg.dev/projects/antigravity-auto-updater-dev/ antigravity-debian main" | sudo tee /etc/apt/sources.list.d/antigravity.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y antigravity
              EXEC_PATH="/usr/bin/antigravity"
              ;;
          esac

          if [ -n "$DOWNLOAD_URL" ]; then
            mkdir -p e2e-app
            ARCHIVE="e2e-app/app"
            curl -fL -A "Mozilla/5.0" -H "Accept: application/octet-stream" "$DOWNLOAD_URL" -o "$ARCHIVE"

            FILE_TYPE=$(file -b "$ARCHIVE")
            case "$FILE_TYPE" in
              *"Debian binary package"*)
                dpkg-deb -x "$ARCHIVE" e2e-app
                ;;
              *"Zip archive"*)
                unzip -q "$ARCHIVE" -d e2e-app
                ;;
              *"HTML"*|*"ASCII text"*)
                echo "Downloaded file does not look like an app archive. File type: $FILE_TYPE" >&2
                exit 1
                ;;
              *"gzip compressed"*)
                tar -xzf "$ARCHIVE" -C e2e-app
                ;;
              *"XZ compressed"*)
                tar -xJf "$ARCHIVE" -C e2e-app
                ;;
              *"bzip2 compressed"*)
                tar -xjf "$ARCHIVE" -C e2e-app
                ;;
              *"ELF"*)
                chmod +x "$ARCHIVE"
                EXEC_PATH="$GITHUB_WORKSPACE/$ARCHIVE"
                ;;
              *)
                echo "Unsupported archive type: $FILE_TYPE" >&2
                exit 1
                ;;
            esac
          fi

          if [ -z "$EXEC_PATH" ]; then
            if [ -x "$GITHUB_WORKSPACE/e2e-app/usr/share/antigravity/antigravity" ]; then
              EXEC_PATH="$GITHUB_WORKSPACE/e2e-app/usr/share/antigravity/antigravity"
            elif [ -x "$GITHUB_WORKSPACE/e2e-app/usr/bin/antigravity" ]; then
              EXEC_PATH="$GITHUB_WORKSPACE/e2e-app/usr/bin/antigravity"
            elif [ -x "$GITHUB_WORKSPACE/e2e-app/antigravity" ]; then
              EXEC_PATH="$GITHUB_WORKSPACE/e2e-app/antigravity"
            fi
          fi

          if [ -z "$EXEC_PATH" ] || [ ! -x "$EXEC_PATH" ]; then
            echo "Could not resolve executable for ${{ matrix.distribution }}." >&2
            exit 1
          fi

          echo "VSCODE_EXECUTABLE_PATH=$EXEC_PATH" >> "$GITHUB_ENV"

      - name: Resolve E2E distribution (Windows)
        if: runner.os == 'Windows' && matrix.distribution != 'vscode'
        shell: pwsh
        run: |
          $downloadUrl = ""
          $execPath = ""
          switch ("${{ matrix.distribution }}") {
            "cursor" {
              $downloadUrl = "${{ env.CURSOR_WINDOWS_URL }}"
              $execPath = Join-Path $env:GITHUB_WORKSPACE "e2e-app\\Cursor.exe"
            }
            "antigravity" {
              $downloadUrl = "${{ env.ANTIGRAVITY_WINDOWS_URL }}"
              $execPath = Join-Path $env:GITHUB_WORKSPACE "e2e-app\\Antigravity.exe"
            }
          }

          if ([string]::IsNullOrWhiteSpace($downloadUrl)) {
            Write-Error "Missing download URL for ${{ matrix.distribution }}."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path e2e-app | Out-Null
          Invoke-WebRequest -Uri $downloadUrl -OutFile $execPath
          "VSCODE_EXECUTABLE_PATH=$execPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      
      - name: Run E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e
        env:
          VSCODE_TEST_DISABLE_WORKSPACE_TRUST: true

      - name: Verify distribution (Linux)
        if: runner.os == 'Linux' && matrix.distribution != 'vscode'
        run: |
          echo "VSCODE_EXECUTABLE_PATH=$VSCODE_EXECUTABLE_PATH"
          VERSION_OUTPUT=$($VSCODE_EXECUTABLE_PATH --version 2>&1 || true)
          echo "$VERSION_OUTPUT"

          case "${{ matrix.distribution }}" in
            cursor)
              echo "$VERSION_OUTPUT" | grep -qi "Cursor" || { echo "Cursor not detected in version output." >&2; exit 1; }
              ;;
            antigravity)
              echo "$VERSION_OUTPUT" | grep -qi "Antigravity" || { echo "Antigravity not detected in version output." >&2; exit 1; }
              ;;
          esac
      
      - name: Run E2E tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e
        env:
          VSCODE_TEST_DISABLE_WORKSPACE_TRUST: true

      - name: Verify distribution (Windows)
        if: runner.os == 'Windows' && matrix.distribution != 'vscode'
        shell: pwsh
        run: |
          Write-Host "VSCODE_EXECUTABLE_PATH=$env:VSCODE_EXECUTABLE_PATH"
          $versionOutput = & $env:VSCODE_EXECUTABLE_PATH --version 2>&1
          Write-Host $versionOutput

          switch ("${{ matrix.distribution }}") {
            "cursor" {
              if ($versionOutput -notmatch "Cursor") { Write-Error "Cursor not detected in version output."; exit 1 }
            }
            "antigravity" {
              if ($versionOutput -notmatch "Antigravity") { Write-Error "Antigravity not detected in version output."; exit 1 }
            }
          }
